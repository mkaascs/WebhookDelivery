env: "local" #prod, dev
http_server:
  port: 8080
  write_timeout: 5s
  read_timeout: 10s
redis:
  addr: "localhost:6379"
  db: 0
  idle_timeout: 10s
  timeout: 5s
  max_retries: 1
db:
  addr: "localhost:5432"
  connection_timeout: 5s
workers:
  max_goroutines: 5
  batch_size: 10
  max_attempts: 5
  ticker_duration: 30s
  base_backoff: 10s
  max_backoff: 1h