services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hookrelay
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d hookrelay"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
  hookrelay:
    build: .
    ports:
      - "5428:8080"
    environment:
      CONFIG_PATH: ${CONFIG_PATH}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: